<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>You're Offline — WorkeX</title>
    <link rel="icon" href="/pwa-icon-192.png">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .container {
            text-align: center;
            max-width: 420px;
        }
        .icon-wrap {
            width: 96px; height: 96px;
            background: linear-gradient(135deg, #6366f1, #818cf8);
            border-radius: 24px;
            display: flex; align-items: center; justify-content: center;
            font-size: 48px;
            margin: 0 auto 32px;
            box-shadow: 0 20px 40px rgba(99,102,241,0.4);
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        h1 {
            font-size: 28px; font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #f1f5f9, #94a3b8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        p {
            color: #64748b; font-size: 15px; line-height: 1.6;
            margin-bottom: 36px;
        }
        .btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 14px 28px; border-radius: 12px;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white; font-size: 15px; font-weight: 600;
            text-decoration: none; border: none; cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(99,102,241,0.4);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99,102,241,0.5);
        }
        .status-bar {
            margin-top: 40px; padding: 16px 20px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px; font-size: 13px; color: #475569;
        }
        .status-dot {
            display: inline-block; width: 8px; height: 8px;
            border-radius: 50%; background: #ef4444;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-wrap">⚡</div>
        <h1>You're Offline</h1>
        <p>It looks like you've lost your internet connection. WorkeX needs connectivity to sync your work data. Check your network and try again.</p>
        <button class="btn" onclick="window.location.reload()">
            ↻ Try Again
        </button>
        <div class="status-bar">
            <span class="status-dot"></span>
            No internet connection detected
        </div>
    </div>
</body>
</html>
